<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Rawai System - أحمد مسلم</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #f1f5f9; margin: 0; padding: 0; }
        
        @media print {
            @page { size: A4 portrait; margin: 0 !important; }
            body, html { height: 100%; margin: 0 !important; padding: 0 !important; overflow: hidden; }
            .no-print { display: none !important; }
            .screen-view { padding: 0 !important; background: white !important; display: block !important; }
            .print-page { 
                width: 210mm !important; height: 297mm !important; 
                margin: 0 !important; position: relative; box-shadow: none !important;
                page-break-after: avoid !important; overflow: hidden !important;
            }
        }

        .screen-view { background: #334155; display: flex; justify-content: center; padding: 20px; min-height: 100vh; }
        .page-box { 
            width: 210mm; min-height: 297mm; background: white; 
            position: relative; box-shadow: 0 0 40px rgba(0,0,0,0.6);
        }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

<script type="text/babel">
    const { useState, useEffect } = React;
    const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbyDJLeEXWYsLo1rjE-HY6qfOy1gmQ1VSXMDGcn7wZGpwHqr6kyJbIfCjLjvkqv17NlKCQ/exec";

    const App = () => {
        const [client, setClient] = useState("أحمد مسلم"); 
        const [ref, setRef] = useState("REF-001");
        const [notes, setNotes] = useState(""); 
        const [saving, setSaving] = useState(false);
        const [items, setItems] = useState([
            { id: 1, desc: "SK booster box", price: 1200, qty: 0, disc: 0, bonus: 0 },
            { id: 2, desc: "SK Booster Serum 30 gm", price: 190, qty: 0, disc: 0, bonus: 0 },
            { id: 3, desc: "SK Booster cleanser 150 gm", price: 125, qty: 0, disc: 0, bonus: 0 },
            { id: 4, desc: "SK sun protector 30 gm", price: 185, qty: 0, disc: 0, bonus: 0 },
            { id: 5, desc: "SK repairing gel 50 gm", price: 230, qty: 0, disc: 0, bonus: 0 }
        ]);

        const updateItem = (id, field, val) => {
            setItems(prev => prev.map(it => it.id === id ? { ...it, [field]: parseFloat(val) || 0 } : it));
        };

        const handleSaveAndPrint = async () => {
            setSaving(true);
            const payload = {
                ref, date: new Date().toLocaleDateString(), client, notes,
                item_1_qty: items[0].qty, item_1_bonus: items[0].bonus, item_1_disc: items[0].disc,
                item_2_qty: items[1].qty, item_2_bonus: items[1].bonus, item_2_disc: items[1].disc,
                item_3_qty: items[2].qty, item_3_bonus: items[2].bonus, item_3_disc: items[2].disc,
                item_4_qty: items[3].qty, item_4_bonus: items[3].bonus, item_4_disc: items[3].disc,
                item_5_qty: items[4].qty, item_5_bonus: items[4].bonus, item_5_disc: items[4].disc,
                subtotal: 0, vat: 0, total: 0
            };

            try {
                await fetch(GOOGLE_SHEET_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                window.print();
            } catch (error) {
                console.error(error);
                alert("حدث خطأ أثناء الترحيل");
            } finally {
                setSaving(false);
            }
        };

        return (
            <div className="flex flex-col lg:flex-row min-h-screen">
                <div className="lg:w-96 p-6 bg-white border-l no-print h-screen overflow-y-auto">
                    <h2 className="text-xl font-bold mb-4">لوحة التحكم</h2>
                    <input className="w-full p-2 border mb-2" value={client} onChange={e => setClient(e.target.value)} placeholder="اسم العميل" />
                    <input className="w-full p-2 border mb-4" value={ref} onChange={e => setRef(e.target.value)} placeholder="رقم المرجع" />
                    
                    {items.map(it => (
                        <div key={it.id} className="mb-4 p-2 border rounded">
                            <p className="text-xs font-bold">{it.desc}</p>
                            <div className="grid grid-cols-3 gap-1">
                                <input type="number" placeholder="كمية" onChange={e => updateItem(it.id, 'qty', e.target.value)} className="p-1 border text-sm" />
                                <input type="number" placeholder="خصم %" onChange={e => updateItem(it.id, 'disc', e.target.value)} className="p-1 border text-sm" />
                                <input type="number" placeholder="بونص" onChange={e => updateItem(it.id, 'bonus', e.target.value)} className="p-1 border text-sm" />
                            </div>
                        </div>
                    ))}
                    
                    <button onClick={handleSaveAndPrint} className="w-full bg-blue-900 text-white py-3 rounded font-bold mt-4 hover:bg-blue-800 transition-colors">
                        {saving ? "جاري..." : "حفظ وطباعة"}
                    </button>
                </div>
                
                <div className="flex-1 screen-view">
                    <div className="page-box print-page p-10">
                        <h1 className="text-2xl font-black text-center mb-10">عرض سعر</h1>
                        <p>العميل: {client}</p>
                        <p>المرجع: {ref}</p>
                        <table className="w-full mt-6 border-collapse">
                            <thead><tr className="bg-gray-100"><th className="border p-2">الصنف</th><th className="border p-2">الكمية</th><th className="border p-2">الخصم</th><th className="border p-2">البونص</th></tr></thead>
                            <tbody>{items.map(it => (
                                <tr key={it.id}><td className="border p-2">{it.desc}</td><td className="border p-2 text-center">{it.qty}</td><td className="border p-2 text-center">{it.disc}%</td><td className="border p-2 text-center">{it.bonus}</td></tr>
                            ))}</tbody>
                        </table>
                    </div>
                </div>
            </div>
        );
    };
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
