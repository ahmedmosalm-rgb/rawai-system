<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Rawai System - أحمد مسلم</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #f1f5f9; margin: 0; padding: 0; }
        
        @media print {
            @page { 
                size: A4; 
                margin: 0 !important; 
            }
            body {
                background: white !important;
                margin: 0 !important;
                padding: 0 !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            .no-print { display: none !important; }
            .screen-view {
                padding: 0 !important;
                background: none !important;
                display: block !important;
            }
            .print-page {
                width: 210mm !important;
                height: 297mm !important;
                padding: 0 !important;
                margin: 0 !important;
                box-shadow: none !important;
                border: none !important;
                page-break-after: always;
                position: relative;
                overflow: hidden;
            }
            .page-box {
                background-image: url('letterhead.jpg') !important;
                background-size: 100% 100% !important;
                background-repeat: no-repeat !important;
            }
        }

        .screen-view { background: #334155; display: flex; justify-content: center; padding: 20px 0; min-height: 100vh; }
        .page-box { 
            width: 210mm; 
            height: 297mm; 
            background: white; 
            background-image: url('letterhead.jpg'); 
            background-size: 100% 100%; 
            position: relative; 
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
        }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        /* Custom styles for increment buttons */
        .qty-btn {
            transition: all 0.2s ease;
            user-select: none;
        }
        .qty-btn:active {
            transform: scale(0.9);
        }
    </style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

<script type="text/babel">
    const { useState, useEffect } = React;
    const App = () => {
        const [client, setClient] = useState("أحمد مسلم"); 
        const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
        const [ref, setRef] = useState("");

        useEffect(() => {
            const cleanDate = date.replace(/-/g, "");
            setRef(`${cleanDate}-01`);
        }, [date]);

        const [items, setItems] = useState([
            { id: 1, desc: "SK booster box", price: 1200, qty: 0, disc: 0, bonus: 0, net: 0, autoBonus: true, taxInclusive: false },
            { id: 2, desc: "SK Booster Serum 30 gm", price: 190, qty: 0, disc: 0, bonus: 0, net: 0, autoBonus: false, taxInclusive: true },
            { id: 3, desc: "SK Booster cleanser 150 gm", price: 125, qty: 0, disc: 0, bonus: 0, net: 0, autoBonus: false, taxInclusive: true },
            { id: 4, desc: "SK sun protector 30 gm", price: 185, qty: 0, disc: 0, bonus: 0, net: 0, autoBonus: false, taxInclusive: true },
            { id: 5, desc: "SK repairing gel 50 gm", price: 230, qty: 0, disc: 0, bonus: 0, net: 0, autoBonus: false, taxInclusive: true }
        ]);

        const updateItem = (id, field, val) => {
            setItems(prev => prev.map(it => {
                if (it.id !== id) return it;
                let numericVal = (field === 'bonus' || field === 'qty' || field === 'disc' || field === 'price' || field === 'net') ? (parseFloat(val) || 0) : val;
                if (numericVal < 0) numericVal = 0; 
                
                let ni = { ...it, [field]: numericVal };
                
                if (field === 'disc' || field === 'price' || field === 'qty') {
                    if (ni.taxInclusive) {
                        let basePrice = ni.price / 1.15;
                        let discountedBase = (basePrice * ni.qty) * (1 - ni.disc/100);
                        ni.net = discountedBase * 1.15;
                    } else {
                        ni.net = (ni.price * ni.qty) * (1 - ni.disc/100);
                    }
                } else if (field === 'net') {
                    let totalBeforeDisc = ni.price * ni.qty;
                    if (totalBeforeDisc > 0) {
                        ni.disc = ((totalBeforeDisc - ni.net) / totalBeforeDisc) * 100;
                    }
                }

                if (field === 'qty' && ni.autoBonus) {
                    let r = [{q:50,b:10},{q:30,b:5},{q:20,b:3},{q:10,b:1}].find(x => ni.qty >= x.q);
                    ni.bonus = r ? r.b : 0;
                }
                
                return ni;
            }));
        };

        const adjustQty = (id, amount) => {
            const item = items.find(i => i.id === id);
            const newQty = Math.max(0, (item.qty || 0) + amount);
            updateItem(id, 'qty', newQty);
        };

        const calculateVatForItem = (item) => {
            if (item.qty <= 0) return 0;
            if (item.taxInclusive) {
                return item.net - (item.net / 1.15);
            } else {
                return item.net * 0.15;
            }
        };

        const totalVat = items.reduce((acc, i) => acc + calculateVatForItem(i), 0);
        const displayFinalTotal = items.reduce((acc, i) => {
            if (i.qty <= 0) return acc;
            const itemVat = i.taxInclusive ? 0 : (i.net * 0.15);
            return acc + i.net + itemVat;
        }, 0);

        const fmt = (num) => {
            if (num === 0 || isNaN(num)) return "0";
            return new Intl.NumberFormat('en-US', {
                minimumFractionDigits: 0,
                maximumFractionDigits: 3
            }).format(num);
        };

        return (
            <div className="flex flex-col lg:flex-row">
                {/* Control Panel */}
                <div className="lg:w-96 p-6 bg-white border-l no-print h-screen sticky top-0 overflow-y-auto shadow-2xl">
                    <h2 className="font-black text-blue-900 mb-6 text-xl border-b pb-2 text-right">لوحة التحكم</h2>
                    <div className="space-y-4 mb-6 text-right">
                        <div>
                           <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest">اسم العميل</label>
                           <input 
                            type="text" 
                            className="w-full p-2 border rounded text-sm font-bold text-right outline-none focus:ring-2 focus:ring-blue-500" 
                            value={client} 
                            onChange={e => setClient(e.target.value)} 
                            onFocus={(e) => e.target.select()}
                           />
                        </div>
                        <div className="grid grid-cols-2 gap-2">
                            <div><label className="text-[10px] font-bold text-gray-400">رقم المرجع</label><input type="text" className="w-full p-2 border rounded text-sm text-right font-bold outline-none" value={ref} onChange={e => setRef(e.target.value)} onFocus={(e) => e.target.select()} /></div>
                            <div><label className="text-[10px] font-bold text-gray-400">التاريخ</label><input type="date" className="w-full p-2 border rounded text-sm text-right font-bold outline-none" value={date} onChange={e => setDate(e.target.value)} /></div>
                        </div>
                    </div>
                    
                    <button onClick={() => window.print()} className="w-full bg-blue-900 text-white py-4 rounded-lg font-black text-lg shadow-lg mb-6 tracking-wider hover:bg-blue-800 transition-all active:scale-95">🖨️ طباعة العرض</button>

                    <div className="border-t pt-4">
                        {items.map(it => (
                            <div key={it.id} className="mb-6 p-4 bg-slate-50 border border-slate-200 rounded-xl text-right text-[11px] shadow-sm">
                                <div className="flex justify-between items-start mb-3">
                                    <span className={`text-[9px] px-2 py-0.5 rounded-full font-bold ${it.taxInclusive ? 'bg-green-100 text-green-700 border border-green-200' : 'bg-orange-100 text-orange-700 border border-orange-200'}`}>
                                        {it.taxInclusive ? 'شامل الضريبة' : '+ ضريبة 15%'}
                                    </span>
                                    <p className="font-black text-slate-800 text-sm">{it.desc}</p>
                                </div>
                                
                                <div className="flex flex-col gap-3">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="flex flex-col">
                                            <label className="text-[9px] font-bold text-slate-400 mb-1">السعر الأساسي</label>
                                            <input type="number" step="0.001" value={it.price} className="w-full p-2 border rounded-lg text-center font-bold text-slate-700 outline-none focus:border-blue-500" onChange={e => updateItem(it.id, 'price', e.target.value)} onFocus={(e) => e.target.select()} />
                                        </div>
                                        <div className="flex flex-col">
                                            <label className="text-[9px] font-bold text-slate-400 mb-1 text-center">الكمية</label>
                                            <div className="flex items-center justify-between bg-white border rounded-lg p-1">
                                                <button onClick={() => adjustQty(it.id, 1)} className="qty-btn w-8 h-8 flex items-center justify-center bg-blue-600 text-white rounded-md font-bold text-lg">+</button>
                                                <input type="number" value={it.qty || 0} className="w-10 text-center font-black text-blue-900 text-sm outline-none border-none pointer-events-none" readOnly />
                                                <button onClick={() => adjustQty(it.id, -1)} className="qty-btn w-8 h-8 flex items-center justify-center bg-red-500 text-white rounded-md font-bold text-lg">-</button>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-3 gap-2">
                                        <div className="text-center">
                                            <label className="text-[9px] font-bold text-slate-400 mb-1 block">خصم %</label>
                                            <input type="number" step="0.001" value={it.disc} className="w-full p-1.5 border rounded-lg text-center outline-none focus:border-blue-500 font-bold text-red-600" onChange={e => updateItem(it.id, 'disc', e.target.value)} onFocus={(e) => e.target.select()} />
                                        </div>
                                        <div className="text-center">
                                            <label className="text-[9px] font-bold text-slate-400 mb-1 block">الصافي</label>
                                            <input type="number" step="0.001" value={it.net} className="w-full p-1.5 border rounded-lg text-center outline-none focus:border-blue-500 font-bold text-blue-900" onChange={e => updateItem(it.id, 'net', e.target.value)} onFocus={(e) => e.target.select()} />
                                        </div>
                                        <div className="text-center">
                                            <label className="text-[9px] font-bold text-slate-400 mb-1 block">بونص</label>
                                            <input type="number" value={it.bonus || 0} className="w-full p-1.5 border rounded-lg text-center outline-none bg-green-50 border-green-200 font-black text-green-700" onChange={e => updateItem(it.id, 'bonus', e.target.value)} onFocus={(e) => e.target.select()} />
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>

                {/* Print View Container */}
                <div className="flex-1 screen-view">
                    <div className="page-box print-page">
                        <div className="absolute top-[4.8cm] left-[1.5cm] right-[1.5cm] bottom-[5.2cm] flex flex-col font-black" dir="ltr">
                            <div className="flex justify-between items-center mb-6 text-[15px]">
                                <div className="border-[3px] border-blue-900 px-4 py-1">Quotation No.: <span className="text-blue-900">{ref}</span></div>
                                <div className="text-blue-900">Date: {date}</div>
                            </div>
                            <div className="space-y-2 text-left mb-4">
                                <div className="flex items-center gap-4"><span className="text-blue-900 min-w-[65px]">To :</span><span className="border-b border-dotted border-slate-400 flex-1 text-xl h-7 font-black">{client}</span></div>
                                <div className="flex items-center gap-4"><span className="text-blue-900 min-w-[65px]">From :</span><span className="text-slate-700 text-lg font-black">Rawai Aljamal Alhaditha Co.</span></div>
                                <div className="flex items-center gap-4"><span className="text-blue-900 min-w-[65px]">Subject:</span><span className="text-xl underline decoration-blue-900 underline-offset-4 font-black italic">SK booster Proposal</span></div>
                            </div>
                            
                            <table className="w-full text-[10px] border-collapse text-center">
                                <thead>
                                    <tr className="bg-blue-900 text-white">
                                        <th className="p-1.5 border border-blue-800 text-left font-black w-[22%]">Description</th>
                                        <th className="p-1.5 border border-blue-800 font-black">Price SR</th>
                                        <th className="p-1.5 border border-blue-800 font-black">Qty</th>
                                        <th className="p-1.5 border border-blue-800 font-black">Total SR</th>
                                        <th className="p-1.5 border border-blue-800 font-black">% Disc</th>
                                        <th className="p-1.5 border border-blue-800 font-black text-slate-200">Excl. VAT</th>
                                        <th className="p-1.5 border border-blue-800 font-black">VAT (15%)</th>
                                        <th className="p-1.5 border border-blue-800 font-black">Net Total</th>
                                        <th className="p-1.5 border border-blue-800 font-black">Bonus</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {items.map(it => {
                                        const vatVal = calculateVatForItem(it);
                                        const priceExclVat = it.net - (it.taxInclusive ? vatVal : 0);
                                        const displayNet = it.taxInclusive ? it.net : (it.net + vatVal);
                                        
                                        return (
                                            <tr key={it.id} className="border-b h-10 text-slate-800 font-black">
                                                <td className="text-left p-1 leading-tight">{it.desc}</td>
                                                <td>{fmt(it.price)}</td>
                                                <td className="bg-slate-50">{it.qty || '-'}</td>
                                                <td>{it.qty ? fmt(it.price * it.qty) : '-'}</td>
                                                <td className="text-red-600">{it.qty && it.disc ? fmt(it.disc) + "%" : "-"}</td>
                                                <td className="text-slate-500">{it.qty ? fmt(priceExclVat) : '-'}</td>
                                                <td className="text-slate-500 font-bold">{it.qty ? fmt(vatVal) : '-'}</td>
                                                <td className="text-blue-900 bg-blue-50/30">{it.qty ? fmt(displayNet) : '-'}</td>
                                                <td className="text-green-700">
                                                    {(it.qty > 0 && it.bonus > 0) ? `${it.qty}+${it.bonus}` : ""}
                                                </td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>

                            <div className="mt-4 flex justify-between items-start">
                                <div className="flex flex-col gap-1">
                                    <p className="text-[10px] text-blue-900 font-black text-center uppercase tracking-tighter">SK booster box system</p>
                                    <div className="flex border border-blue-900 rounded shadow-sm overflow-hidden text-[11px]">
                                        <div className="bg-blue-900 text-white p-1 text-[9px] font-black rounded-l [writing-mode:vertical-lr] rotate-180 h-20 text-center uppercase">Bonus</div>
                                        <table className="text-[11px] text-center border-collapse">
                                            <thead className="bg-slate-50 font-black text-blue-900"><tr><th className="px-3 border-b border-l border-blue-900">Qty</th><th className="px-3 border-b border-blue-900">Free</th></tr></thead>
                                            <tbody className="font-black">
                                                <tr><td className="border-b border-l border-blue-900">10</td><td className="border-b border-blue-900 text-blue-900">+1</td></tr>
                                                <tr><td className="border-b border-l border-blue-900">20</td><td className="border-b border-blue-900 text-blue-900">+3</td></tr>
                                                <tr><td className="border-b border-l border-blue-900">30</td><td className="border-b border-blue-900 text-blue-900">+5</td></tr>
                                                <tr><td className="border-l border-blue-900">50</td><td className="text-blue-900">+10</td></tr>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>

                                <div className="w-80 bg-blue-900 text-white p-4 rounded-2xl shadow-lg font-black">
                                    <div className="flex justify-between text-[12px] opacity-80 mb-0.5"><span>Subtotal (Excl. VAT):</span><span>{fmt(displayFinalTotal - totalVat)} SR</span></div>
                                    <div className="flex justify-between text-[12px] text-red-300 font-bold mb-1.5"><span>Total VAT (15%):</span><span>{fmt(totalVat)} SR</span></div>
                                    <div className="flex justify-between font-black text-2xl border-t border-blue-800 pt-2"><span>TOTAL:</span><span>{fmt(displayFinalTotal)} SR</span></div>
                                </div>
                            </div>

                            <div className="mt-auto grid grid-cols-2 pt-4 border-t border-slate-200 items-end mb-2 font-black">
                                <div><p className="text-[13px] text-blue-900 mb-1 uppercase font-black">Payment & Terms:</p><ul className="text-[12px] text-slate-600 leading-tight font-black"><li>• 1- Cash 5% discount</li><li>• 2- Payment Terms: 30 Days</li></ul></div>
                                <div className="text-left font-black">
                                    <p className="text-[13px] text-blue-900 mb-1 uppercase font-black">Bank Info:</p>
                                    <div className="text-[12px] text-slate-600 leading-tight font-black">
                                        <p>Bank: Bank Alinma</p>
                                        <p className="text-blue-900 text-[11px] font-black">SA2805000068206829136000</p>
                                        <p className="text-[10px] font-black">VAT No: 314243545400003</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        );
    };
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
