<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة إصدار عروض الأسعار الذكية</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap');
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: #f4f6f9;
            color: #333;
            padding: 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        .header-banner {
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            color: white;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 30px;
        }

        .header-banner h1 {
            font-size: 24px;
            font-weight: 900;
            margin-bottom: 5px;
        }

        .header-banner p {
            font-size: 14px;
            opacity: 0.9;
        }

        .meta-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
            background: #f8fafc;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-weight: 700;
            color: #1e3a8a;
            font-size: 14px;
        }

        .form-group input, .form-group textarea {
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }

        .form-group input:focus, .form-group textarea:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
            font-size: 14px;
        }

        th {
            background-color: #1e3a8a;
            color: white;
            padding: 12px;
            font-weight: 700;
            text-align: right;
        }

        th:first-child { border-top-right-radius: 8px; }
        th:last-child { border-top-left-radius: 8px; }

        td {
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
        }

        .input-qty, .input-disc, .input-bonus {
            width: 70px;
            padding: 6px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            text-align: center;
            font-weight: 600;
        }

        .total-section {
            background: #f1f5f9;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            text-align: left;
        }

        .total-row {
            display: flex;
            justify-content: flex-end;
            gap: 50px;
            font-size: 16px;
            margin-bottom: 10px;
        }

        .total-row.grand {
            font-size: 22px;
            font-weight: 900;
            color: #1e3a8a;
            border-top: 2px solid #cbd5e1;
            padding-top: 10px;
        }

        .btn-submit {
            width: 100%;
            background: #1e3a8a;
            color: white;
            padding: 16px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(30, 58, 138, 0.2);
            transition: all 0.2s;
        }

        .btn-submit:hover {
            background: #1d4ed8;
        }

        /* تنسيقات خاصة بالطباعة لإخفاء الأزرار وتحسين المظهر الورقي */
        @media print {
            body { background: white; padding: 0; }
            .container { box-shadow: none; padding: 0; }
            .no-print { display: none !important; }
            input, textarea { border: none !important; background: transparent !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-banner">
        <h1>عرض سعر معتمد</h1>
        <p>مجموعة روائع الطبية - نظام ترحيل البيانات الذكي تلقائياً</p>
    </div>

    <div class="meta-grid">
        <div class="form-group">
            <label>رقم المرجع (Quotation No):</label>
            <input type="text" id="quotation-ref" placeholder="مثال: QT-2026-001">
        </div>
        <div class="form-group">
            <label>التاريخ (Date):</label>
            <input type="date" id="quotation-date">
        </div>
        <div class="form-group">
            <label>اسم العميل / العيادة (Client):</label>
            <input type="text" id="quotation-client" placeholder="اسم العيادة أو الطبيب">
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>اسم المنتج</th>
                <th>السعر الأساسي</th>
                <th>الكمية</th>
                <th>الخصم (%)</th>
                <th>البونص</th>
                <th>الصافي</th>
            </tr>
        </thead>
        <tbody id="products-tbody">
            </tbody>
    </table>

    <div class="form-group" style="margin-bottom: 30px;">
        <label>ملاحظات إضافية (Notes):</label>
        <textarea id="quotation-notes" rows="3" placeholder="أي شروط أو ملاحظات خاصة بالعرض..."></textarea>
    </div>

    <div class="total-section">
        <div class="total-row">
            <span>الإجمالي قبل الخصم:</span>
            <span id="subtotal-val">0.00</span> ر.س
        </div>
        <div class="total-row grand">
            <span>الإجمالي النهائي:</span>
            <span id="grand-total-val">0.00</span> ر.س
        </div>
    </div>

    <button type="button" class="btn-submit no-print" onclick="handlePrintAndSave()">
        🖨️ طباعة العرض وحفظ البيانات تلقائياً
    </button>
</div>

<script>
    // 1. مصفوفة المنتجات الـ 6 المعتمدة لديك بالأسعار
    const productsData = [
        { id: 1, desc: "SK booster box", price: 500 },
        { id: 2, desc: "SK Booster Serum 30 gm", price: 250 },
        { id: 3, desc: "SK Booster cleanser 150 gm", price: 120 },
        { id: 4, desc: "SK sun protector 30 gm", price: 180 },
        { id: 5, desc: "SK repairing gel 50 gm", price: 220 },
        { id: 6, desc: "SK brand product 6", price: 300 } // المنتج السادس
    ];

    // تعيين تاريخ اليوم تلقائياً
    document.getElementById('quotation-date').valueAsDate = new Date();
    
    // توليد جدول المنتجات في الـ HTML
    const tbody = document.getElementById('products-tbody');
    productsData.forEach(p => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><strong>${p.desc}</strong></td>
            <td>${p.price.toFixed(2)} ر.س</td>
            <td><input type="number" class="input-qty" id="qty-${p.id}" value="0" min="0" oninput="calculateTotals()"></td>
            <td><input type="number" class="input-disc" id="disc-${p.id}" value="0" min="0" max="100" oninput="calculateTotals()"></td>
            <td><input type="number" class="input-bonus" id="bonus-${p.id}" value="0" min="0" oninput="calculateTotals()"></td>
            <td><span id="net-${p.id}">0.00</span> ر.س</td>
        `;
        tbody.appendChild(tr);
    });

    // دالة حساب الحسابات التلقائية لكل سطر والإجمالي العام
    function calculateTotals() {
        let subtotal = 0;
        let grandTotal = 0;

        productsData.forEach(p => {
            const qty = parseFloat(document.getElementById(`qty-${p.id}`).value) || 0;
            const disc = parseFloat(document.getElementById(`disc-${p.id}`).value) || 0;
            
            const itemSubtotal = p.price * qty;
            const itemNet = itemSubtotal * (1 - (disc / 100));
            
            subtotal += itemSubtotal;
            grandTotal += itemNet;

            document.getElementById(`net-${p.id}`).innerText = itemNet.toFixed(2);
        });

        document.getElementById('subtotal-val').innerText = subtotal.toFixed(2);
        document.getElementById('grand-total-val').innerText = grandTotal.toFixed(2);
    }

    // دالة الربط، الترحيل والطباعة (المربوطة بزرار السطر 137)
    function handlePrintAndSave() {
        const ref = document.getElementById('quotation-ref').value || "بدون مرجع";
        const date = document.getElementById('quotation-date').value;
        const client = document.getElementById('quotation-client').value || "عميل عام";
        const notes = document.getElementById('quotation-notes').value || "-";
        const total = document.getElementById('grand-total-val').innerText;

        // دالة مساعدة لمعرفة كمية وبونص كل منتج
        const getProductInfo = (id) => {
            const qty = parseFloat(document.getElementById(`qty-${id}`).value) || 0;
            const bonus = parseFloat(document.getElementById(`bonus-${id}`).value) || 0;
            if (qty === 0) return 0;
            return bonus > 0 ? `${qty}+${bonus}` : qty;
        };

        // ترحيل البيانات فوراً لجوجل شيت عبر الـ Web App الخاص بك
        fetch('https://script.google.com/macros/s/AKfycbyoVOROWQjx4GsbU1K97NL-p0H3tFpEs9vZJZu4vmvey6laNVFPrHNtzNMnlQ3lZYcU/exec', {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                ref: ref,
                date: date,
                client: client,
                p1_qty: getProductInfo(1), // SK booster box
                p2_qty: getProductInfo(2), // SK Booster Serum
                p3_qty: getProductInfo(3), // SK Booster cleanser
                p4_qty: getProductInfo(4), // SK sun protector
                p5_qty: getProductInfo(5), // SK repairing gel
                p6_qty: getProductInfo(6), // المنتج السادس
                notes: notes,
                total: total
            })
        })
        .then(() => {
            // فتح نافذة الطباعة فوراً بعد الإرسال
            window.print();
        })
        .catch(err => {
            console.error("حدث خطأ أثناء الترحيل لجوجل شيت:", err);
            // حتى لو حصل مشكلة في الشبكة، يفتح الطباعة عشان يعطلكش
            window.print();
        });
    }
</script>

</body>
</html>
